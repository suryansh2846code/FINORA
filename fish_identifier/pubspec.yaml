name: fish_identifier
description: AI-powered fish identification app using YOLOv8
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # ML
  tflite_flutter: ^0.11.0
  opencv_dart: ^1.0.0
  
  # Image Processing
  image_picker: ^1.0.4
  image: ^4.1.3
  
  # DI
  get_it: ^7.6.4
  
  # UI
  google_fonts: ^6.1.0
  
  # Utils
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # AR

  vector_math: ^2.1.4
  ar_flutter_plugin_updated: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
